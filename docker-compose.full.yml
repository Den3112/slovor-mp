version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: slovor-mp-web:latest
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    depends_on:
      - db
      - minio
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/slovor
      - STORAGE_ENDPOINT=http://minio:9000
    volumes:
      - .:/app:cached

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slovor
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:RELEASE.2023-12-18T00-00-00Z
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
    volumes:
      - minio-data:/data

  migrate:
    image: node:22
    working_dir: /app
    volumes:
      - .:/app:cached
    entrypoint: ["/bin/sh","-c"]
    command: "npm run db:info || echo 'Run migrations manually'"
    depends_on:
      - db

volumes:
  db-data:
  minio-data:

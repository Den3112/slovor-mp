services:
  app:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /app/.next/cache:noexec,nosuid,size=512m
    user: "1001:1001"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: &l
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - frontend
      - backend
    # We expose port locally because we don't have Angie reverse proxy yet.
    ports:
      - "127.0.0.1:3000:3000"

  db:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    # DB needs some write access to root for init, we keep it simple for stateful services
    read_only: false
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *l
    networks:
      - backend

  redis:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    read_only: false
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *l
    networks:
      - backend

  minio:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging: *l
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true

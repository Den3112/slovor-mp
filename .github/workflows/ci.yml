name: CI Verification

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env context
        env:
          SP_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          SP_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          SP_ROLE: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          CL_NAME: "${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}"
          CL_KEY: "${{ secrets.CLOUDINARY_API_KEY }}"
          CL_SECRET: "${{ secrets.CLOUDINARY_API_SECRET }}"
          CL_URL: "${{ secrets.CLOUDINARY_URL }}"
          APP_URL: "${{ secrets.NEXT_PUBLIC_APP_URL }}"
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${SP_URL:-https://mock-project.supabase.co}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${SP_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjEyMzQ1Njc4LCJleHAiOjE5Mjc5MjE2Nzh9.rjPb5D5d3z5z5z5z5z5z5z5z5z5z5z5z5z5z5z5z5z5}" >> .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${SP_ROLE:-mock-service-role-key}" >> .env.local
          echo "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${CL_NAME:-mock-cloud}" >> .env.local
          echo "CLOUDINARY_API_KEY=${CL_KEY:-123456789012345}" >> .env.local
          echo "CLOUDINARY_API_SECRET=${CL_SECRET:-mock-api-secret-123}" >> .env.local
          echo "CLOUDINARY_URL=${CL_URL:-cloudinary://123456789012345:mock-api-secret-123@mock-cloud}" >> .env.local
          echo "NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}" >> .env.local

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Debug Environment
        run: |
          node -v
          npm -v
          git --version

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Build
        run: npm run build
